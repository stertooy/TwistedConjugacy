name: Setup
description: "Setup GAPROOT and dependencies"

runs:
  using: "composite"
  steps:

    - name: "Add custom GAP root"
      shell: bash
      run: ln -f -s $PWD /tmp/gaproot/pkg/

    - name: "Install Polycyclic 2.17"
      shell: bash
      run: |
        gap -A << GAPInput
          PKG := "polycyclic";
          VER := "2.17";
          if TestPackageAvailability( PKG, VER ) = fail then
            LoadPackage( "PackageManager" : OnlyNeeded );
            QuitGap( InstallPackage( PKG, VER ) );
          else
            QuitGap( 0 );
          fi;
        GAPInput

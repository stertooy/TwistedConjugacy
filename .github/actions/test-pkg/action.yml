name: Test (package)
description: "Test package"
inputs:
  gap-version:
    type: string
  mode:
    default: 'default'
    type: string
  warnings-as-errors:
    default: true
    type: boolean
  coverage:
    default: false
    type: boolean

runs:
  using: "composite"
  steps:

    - name: "Add custom GAP root"
      shell: bash
      run: ln -f -s $PWD /tmp/gaproot/pkg/

    - name: "Install Polycyclic 2.17"
      shell: bash
      if: ${{ inputs.mode != 'onlyneeded' && inputs.gap-version == '4.14.0' }}
      run: |
        gap -A << GAPInput
          LoadPackage( "PackageManager" : OnlyNeeded );
          QuitGap( InstallPackage( "polycyclic", "=2.17" ) );
        GAPInput

    - name: "Run package tests"
      uses: gap-actions/run-pkg-tests@v4
      with:
        coverage: ${{ inputs.coverage }}
        mode: ${{ inputs.mode }}
        warnings-as-errors: ${{ inputs.warnings-as-errors }}

    - name: "Process coverage"
      if: ${{ inputs.coverage }}
      uses: gap-actions/process-coverage@v3

    - name: "Upload coverage"
      if: ${{ inputs.coverage }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true

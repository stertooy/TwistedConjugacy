name: CI
on:
  - push
  - pull_request
  - workflow_call
  - workflow_dispatch

jobs:

  test-pkg:
    name: "Test package (version: ${{ matrix.gap-version }}, mode: ${{ matrix.mode }})"
    container:
      image: ghcr.io/stertooy/gda-image:${{ matrix.gap-version }}-${{ matrix.mode == 'loadall' && 'full' || 'slim' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gap-version: [ "4.14.0", "4.15.0", "4.15.1", "master" ]
        mode: [ "default", "onlyneeded" ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: "Test package"
        uses: ./.github/actions/test-pkg
        with:
          mode: ${{ matrix.mode }}
          warnings-as-errors: true
          coverage: ${{ matrix.gap-version == 'master' }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  test-gap:
    name: "Test GAP (version: ${{ matrix.gap-version }}, mode: ${{ matrix.mode }})"
    container:
      image: ghcr.io/stertooy/gda-image:${{ matrix.gap-version }}-${{ matrix.mode == 'loadall' && 'full' || 'slim' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gap-version: [ "4.14.0", "4.15.0", "4.15.1", "master" ]
        mode: [ "default", "onlyneeded" ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: "Test GAP"
        uses: ./.github/actions/test-gap
        with:
          mode: ${{ matrix.mode }}
          warnings-as-errors: true

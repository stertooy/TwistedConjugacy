name: Docs
on:
  - push
  - pull_request
  - workflow_call
  - workflow_dispatch

jobs:

  validate:
    name: "Create, test and upload manual"
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/stertooy/gda-image:master-full

    steps:

      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Setup"
        uses: ./.github/actions/setup

      - name: "Install latest AutoDoc"
        shell: bash
        run: |
          gap -A << GAPInput
            LoadPackage( "PackageManager" : OnlyNeeded );
            QuitGap( InstallPackage( "https://github.com/gap-packages/AutoDoc.git" ) );
          GAPInput

      - name: "Install extra bibtex"
        shell: bash
        run: |
          sudo apt install texlive-bibtex-extra -y

      - name: "Build manual"
        uses: gap-actions/build-pkg-docs@v2

      - name: "Validate PackageInfo.g"
        shell: bash
        run: gap -c 'QuitGap(ValidatePackageInfo("PackageInfo.g"));'

      - name: "Upload manual"
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: ./doc/manual.pdf
          if-no-files-found: error
